site_name: JP-Trip
site_description: Персональный семейный путеводитель по Токио
site_author: Andre
site_url: https://nepcuku-shprshty.github.io/JP-Trip/
use_directory_urls: true

theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Включить темную тему

    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Включить светлую тему

nav:
  - Главная: index.md
  - Маршрут поездки: master-itinerary.md

  - Логистика:
      - Перелет: flight-guide.md
      - Пересадка в Сеуле: seoul-transit.md
      - Район Oshiage: living-in-oshiage.md

  - Дни в Токио:
      - День 1 — Прибытие: day-01-arrival.md
      - День 2 — Старый Токио: day-02-asakusa-v2.md
      - День 3 — Цукидзи и Гиндза: day-03-tsukiji-ginza-v2.md
      - День 4 — Харадзюку и Сибуя: day-04-harajuku-shibuya-v2.md
      - День 5 — Disneyland: day-05-disneyland.md
      - День 6 — Уэно и Амейоко: day-06-ueno-ameyoko.md
      - День 7 — Одайба: day-07-odaiba.md

  - Интересные места:
      - День 2 — Асакуса: day-02-asakusa-places.md
      - День 3 — Цукидзи и Гиндза: day-03-tsukiji-ginza-v2.md
      - День 4 — Харадзюку и Сибуя: day-04-harajuku-shibuya-places.md
      - День 5 — Disneyland: day-05-disneyland-places.md
      - День 6 — Уэно и Амейоко: day-06-ueno-ameyoko-places.md
      - День 7 — Одайба: day-07-odaiba-places.md

  - Справочники:
      - 🛍️ Шопинг в Японии: japan-insider/shopping.md
      - Travel Companion: travel-companion.md
      - Японский для туриста: japanese-phrases.md

  - JP Japan Insider:
      - Главная: japan-insider/index.md
      - 🎌 Асакуса: japan-insider/asakusa.md
      - 🗼 Tokyo Skytree: japan-insider/tokyo-skytree.md
      - 🐟 Цукидзи: japan-insider/tsukiji.md
      - 🧺 Рынки Токио: japan-insider/tokyo-markets.md
      - 🎎 Фестивали Токио осенью 2026: japan-insider/tokyo-festivals-october-november-2026.md
      - 💎 Гиндза: japan-insider/ginza.md
      - 🌿 Харадзюку: japan-insider/harajuku.md
      - 🌃 Сибуя: japan-insider/shibuya.md
      - 🐼 Уэно: japan-insider/ueno.md
      - Akihabara: japan-insider/akihabara.md
      - 🌈 Одайба: japan-insider/odaiba.md
      - 🏰 Disneyland: japan-insider/disneyland.md
      - 🎌 Этикет: japan-insider/etiquette.md
      - 🏪 Комбини: japan-insider/convenience-stores.md
      - 🚇 Транспорт: japan-insider/transport.md
      - 🍣 Еда: japan-insider/japanese-food.md
      - 🛍️ Шопинг: japan-insider/shopping.md
      - 🍢 Японский стритфуд: japan-insider/japanese-street-food.md
      - ❌ Ошибки туристов: japan-insider/tourist-mistakes.md

  - Книга: book.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
